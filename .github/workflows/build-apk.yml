name: Build Flet Android APK (Fast Fix)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 🛠️ Fix: Ensure we match whatever package management tool gets fetched
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.7'
          cache: true

      - name: Build Android APK
        run: |
          flutter config --no-analytics
          # 🚀 FIX: The dot "." MUST sit immediately right after "apk"
          flet build apk . --module-name main.py --permissions camera --verbose

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hamza-Flashlight-App
          path: build/apk/app-release.apk
