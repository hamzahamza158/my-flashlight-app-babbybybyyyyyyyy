name: Build Flet Android APK (Fast Fix)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # تحديث: إجبار الخادم على العمل من المجلد الرئيسي للمستودع مباشرة
      - name: Verify Workspace Structure
        run: |
          echo "Current working directory:"
          pwd
          echo "Files in root directory:"
          ls -la

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.7'
          cache: true

      - name: Build Android APK
        # الحل الجذري: تحديد مسار تنفيذ الأمر بشكل مطلق وضمان استجابة المحرك التلقائية
        run: |
          flutter config --no-analytics
          python -m flet build apk . --module-name main --permissions camera --verbose

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hamza-Flashlight-App
          path: build/apk/app-release.apk
