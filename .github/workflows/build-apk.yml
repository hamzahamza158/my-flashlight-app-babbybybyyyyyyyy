name: Build Flet Android APK (Final Master Fix)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.7'
          cache: true

      # 🚀 تعديل ذكي: التحقق من وجود الملف وتجنب نسخ الملف فوق نفسه لحل خطأ الـ cp
      - name: Verify and Touch main.py
        run: |
          if [ -f "./main.py" ]; then
            echo "main.py is exactly where it needs to be. Refreshing timestamp..."
            touch ./main.py
          else
            echo "Searching for main.py elsewhere..."
            TARGET_FILE=$(find . -name "main.py" -o -name "Main.py" | head -n 1)
            if [ -n "$TARGET_FILE" ]; then
              cp "$TARGET_FILE" ./main.py
            fi
          fi

      - name: Build Android APK
        run: |
          flutter config --no-analytics
          # تشغيل أمر البناء مع إجبار المحرك على رؤية المجلد الحالي كمصدر رئيسي ومستقل
          flet build apk --permissions camera --verbose

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hamza-Flashlight-App
          path: build/apk/app-release.apk
