name: Build Flet Android APK (Ultimate Anti-Error)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔍 خطوة سحرية للتحقق: ستطبع لنا في الـ Logs مكان ملف main.py بالضبط إذا كان تائهاً
      - name: Find and Verify main.py Location
        run: |
          echo "=== Searching for main.py inside the project ==="
          find . -name "main.py" -o -name "Main.py"
          echo "================================================"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.7'
          cache: true

      # 🚀 الحل النهائي: نقوم بإنشاء نسخة مضمونة من ملف main.py في الجذور قبل تشغيل أمر البناء
      - name: Force Ensure main.py is in Root
        run: |
          TARGET_FILE=$(find . -name "main.py" -o -name "Main.py" | head -n 1)
          if [ -n "$TARGET_FILE" ]; then
            echo "Found main.py at $TARGET_FILE. Copying to root to destroy Flet error..."
            cp "$TARGET_FILE" ./main.py
          else
            echo "CRITICAL WARNING: main.py completely missing from repository!"
          fi

      - name: Build Android APK
        run: |
          flutter config --no-analytics
          flet build apk --permissions camera --verbose

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hamza-Flashlight-App
          path: build/apk/app-release.apk
