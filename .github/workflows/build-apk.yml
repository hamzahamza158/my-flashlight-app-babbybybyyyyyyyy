name: Build Flet Android APK (Final Certified Fix)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.7'
          cache: true

      - name: Build Android APK
        run: |
              flutter config --no-analytics
              flet build apk --permissions camera --include-packages flet_flashlight,flet_permission_handler --verbose
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hamza-Flashlight-App
          # 🚀 FIX: Targets your custom renamed binary to resolve the missing artifact issue!
          path: |
            build/apk/flash-app.apk
            **/flash-app.apk
